version = "gps-20260327105028"

[[rules]]
id = "R001"
name = "Allow health endpoint"
enabled = true
priority = 5
action = "allow"
description = "Keep health checks predictable and low-noise."

[rules.condition]
type = "path_exact"
value = "/api/health"

[[rules]]
id = "R002"
name = "Block admin paths"
enabled = true
priority = 10
action = "block"
description = "Do not expose admin-like routes on the public edge."

[rules.condition]
type = "path_prefix"
value = "/admin"

[[rules]]
id = "R003"
name = "Block cloud metadata probing"
enabled = true
priority = 20
action = "block"
description = "Protect against SSRF-style probing to metadata endpoints."

[rules.condition]
type = "regex_match"
target = "uri"
pattern = '(?i)latest/meta-data|metadata\.google\.internal'

[[rules]]
id = "R004"
name = "Block traversal and sensitive file probes"
enabled = true
priority = 30
action = "block"
description = "Stop common traversal probes and sensitive local file access attempts."

[rules.condition]
type = "regex_match"
target = "uri"
pattern = '(?i)(\.\./|%2e%2e%2f|/etc/passwd|win\.ini)'

[[rules]]
id = "GPS_REGEX_2"
name = "Block synthesized /etc/passwd probes"
enabled = true
priority = 35
action = "block"
description = "Synthesized from 10 recent malicious requests and validated against benign request URIs."

[rules.condition]
type = "regex_match"
target = "uri"
pattern = "(?i)/etc/passwd"

[[rules]]
id = "GPS_REGEX_1"
name = "Block synthesized ../ probes"
enabled = true
priority = 35
action = "block"
description = "Synthesized from 5 recent malicious requests and validated against benign request URIs."

[rules.condition]
type = "regex_match"
target = "uri"
pattern = '(\.\./|\.\.\\)'

[[rules]]
id = "GPS_REGEX_3"
name = "Block synthesized ${jndi: probes"
enabled = true
priority = 35
action = "block"
description = "Synthesized from 4 recent malicious requests and validated against benign request URIs."

[rules.condition]
type = "regex_match"
target = "uri"
pattern = '\$\{jndi:'

[[rules]]
id = "R005"
name = "Log suspicious automation user-agents"
enabled = true
priority = 40
action = "log"
description = "Track known scanner-style user-agents without hard blocking."

[rules.condition]
type = "header_contains"
header = "user-agent"
value = "sqlmap"

[[rules]]
id = "R006"
name = "Block SQLi keyword patterns in URI"
enabled = true
priority = 45
action = "block"
description = "Catch common custom SQLi probes even with compact or encoded spacing."

[rules.condition]
type = "regex_match"
target = "uri"
pattern = '(?i)or(?:\s|\+|%20)*1(?:\s|\+|%20)*=(?:\s|\+|%20)*1|union(?:\s|\+|%20)*select'

[[rules]]
id = "R007"
name = "Block SQLi keyword patterns in body"
enabled = true
priority = 46
action = "block"
description = "Catch SQLi probes sent in request body for demo and real attacks."

[rules.condition]
type = "regex_match"
target = "body"
pattern = '(?i)or(?:\s|\+|%20)*1(?:\s|\+|%20)*=(?:\s|\+|%20)*1|union(?:\s|\+|%20)*select'

[[rules]]
id = "R009"
name = "Block XXE payloads"
enabled = true
priority = 50
action = "block"
description = "Detect XML external entity payloads."

[rules.condition]
type = "regex_match"
target = "body"
pattern = "(?i)<!doctype|<!entity"

[[rules]]
id = "R010"
name = "Block Log4Shell JNDI lookups in URI"
enabled = true
priority = 55
action = "block"
description = "Block JNDI lookup payloads in query strings or paths."

[rules.condition]
type = "regex_match"
target = "uri"
pattern = '(?i)\$\{\s*jndi\s*:(?:ldap|rmi|dns|ldaps|nis|iiop|corba)://[^}]+\}'

[[rules]]
id = "R011"
name = "Block Log4Shell JNDI lookups in body"
enabled = true
priority = 56
action = "block"
description = "Block JNDI lookup payloads in request bodies."

[rules.condition]
type = "regex_match"
target = "body"
pattern = '(?i)\$\{\s*jndi\s*:(?:ldap|rmi|dns|ldaps|nis|iiop|corba)://[^}]+\}'

[[rules]]
id = "R008"
name = "Block high-risk cumulative requests"
enabled = true
priority = 60
action = "block"
description = "If earlier layers raise risk significantly, force a block."

[rules.condition]
type = "risk_above"
threshold = 0.8500000238418579
